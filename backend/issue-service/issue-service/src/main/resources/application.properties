# ===============================
# LOGGING CONFIG
# ===============================

# File location (auto-created)
logging.file.name=logs/issue-service.log

# Log levels
logging.level.root=INFO
logging.level.com.user_service=DEBUG

# Console format (optional but cleaner)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] [%thread] %logger{36} - %msg%n

# File format
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# ===============================
# ROLLING LOG CONFIG (IMPORTANT)
# ===============================

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7