spring.application.name=user-service

#	Eureka Connection
server.port=8081
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Keep it false for testing
eureka.client.enabled=true

#	Database and Jpa Hibernate
spring.datasource.url=jdbc:mysql://localhost:3306/lab_management_user_db
spring.datasource.username=root
spring.datasource.password=saki7

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#logging.level.org.springframework=DEBUG

# ===============================
# LOGGING CONFIG
# ===============================

# File location (auto-created)
logging.file.name=logs/user-service.log

# Log levels
logging.level.root=INFO
logging.level.com.user_service=DEBUG

# Console format (optional but cleaner)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] [%thread] %logger{36} - %msg%n

# File format
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# ===============================
# ROLLING LOG CONFIG (IMPORTANT)
# ===============================

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7